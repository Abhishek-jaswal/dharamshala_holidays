<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green circle background -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  
  <!-- Mountain shape (representing Dharamshala) -->
  <path d="M 50 120 L 100 50 L 150 120" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Pine trees indicating greenery -->
  <g>
    <!-- Left tree -->
    <polygon points="70,120 65,105 60,100 60,95 65,95 70,85 75,95 80,95 80,100 75,105" fill="#22c55e"/>
    <rect x="68" y="120" width="4" height="15" fill="#8b7355"/>
    
    <!-- Right tree -->
    <polygon points="130,120 125,105 120,100 120,95 125,95 130,85 135,95 140,95 140,100 135,105" fill="#22c55e"/>
    <rect x="128" y="120" width="4" height="15" fill="#8b7355"/>
  </g>
  
  <!-- Taxi representation (car icon) -->
  <g transform="translate(100, 140)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="-8" cy="4" r="3" fill="#0ea5e9"/>
    <circle cx="8" cy="4" r="3" fill="#0ea5e9"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#16a34a">SKD HOLIDAYS</text>
</svg>
